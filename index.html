    .steam span {

      width: 10px;
      height: 60px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0));
      filter: blur(1px);
      animation: steam 5s ease-in-out infinite;
      opacity: 0;
    }
    .steam span:nth-child(1) { left: 8px; animation-delay: 0s; }
    .steam span:nth-child(2) { left: 22px; animation-delay: 1.2s; }
    .steam span:nth-child(3) { left: 36px; animation-delay: 2.4s; }
    @keyframes steam {
      0% { transform: translateY(8px) scaleX(0.9); opacity: 0; }
      30% { opacity: 0.45; }
      100% { transform: translateY(-72px) translateX(6px) scaleX(1.25); opacity: 0; }
    }
    @keyframes postcardMarquee {
      0% { transform: translateX(0); }

    }
